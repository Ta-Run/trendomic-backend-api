# Trendomic - Backend + PostgreSQL
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: trendomic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trendomic
      POSTGRES_PASSWORD: trendomic_secret
      POSTGRES_DB: trendomic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trendomic -d trendomic"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trendomic-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api
      DATABASE_URL: postgresql://trendomic:trendomic_secret@postgres:5432/trendomic?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-refresh-in-production}
      JWT_REFRESH_EXPIRES: 7d
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 100
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && node dist/main.js"

volumes:
  postgres_data:
