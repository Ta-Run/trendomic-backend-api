# Trendomic - Development (backend runs locally, DB in Docker)
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: trendomic-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: trendomic
      POSTGRES_PASSWORD: trendomic_secret
      POSTGRES_DB: trendomic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trendomic -d trendomic"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
